<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Prenotazioni</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

    <div class="header-controls">
        <h1>Gestione Prenotazioni</h1>
        <button id="btn-nuova">+ Nuova Prenotazione</button>
    </div>

    <div id="tabs-container" class="tabs"></div>
    <div id="table-container"></div>

    <dialog id="booking-modal">
        <h2 id="modal-title">Nuova Prenotazione</h2>
        <form id="adminForm">
            <div class="form-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" required>
            </div>
            <div class="form-group">
                <label for="cognome">Cognome</label>
                <input type="text" id="cognome" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="settimana_eventi">Settimana (es. 2026-W07)</label>
                <input type="week" id="settimana_eventi" min="2026-W07" max="2026-W39" required>
            </div>
            
            <div class="form-group">
                <label for="workshop">Workshop</label>
                <select id="workshop" required>
                    <option value="">-- Seleziona Workshop --</option>
                    <option value="Digital Painting">Digital Painting</option>
                    <option value="Virtual Reality">Virtual Reality</option>
                    <option value="3D Printed Sculpture">3D Printed Sculpture</option>
                    <option value="Spatial video-sound art">Spatial video-sound art</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="turno">Turno</label>
                <select id="turno" required>
                    <option value="">-- Seleziona prima un workshop --</option>
                </select>
            </div>

            <div class="modal-actions">
                <button type="button" class="btn-cancel" id="btn-chiudi-modal">Annulla</button>
                <button type="submit">Salva</button>
            </div>
        </form>
    </dialog>

    <script src="/scripts/admin.js"></script>
</body>
</html>
